<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Halo — a native macOS terminal on libghostty</title>
<meta name="description" content="A native macOS terminal emulator built on libghostty. GPU-rendered, scriptable by agents, with a git-worktree session per task.">
<link rel="icon" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="home">
  <main class="hero">
    <img class="mark" src="assets/halo-mark.png" alt="Halo" width="128" height="128">
    <h1 class="wordmark" aria-label="Halo"><span>H</span><span>a</span><span>l</span><span>o</span></h1>
    <p class="lede">A native&nbsp;macOS terminal on <a href="https://ghostty.org">libghostty</a> —
      GPU-rendered, scriptable by agents, a git&#8209;worktree session per task.</p>
    <nav class="actions">
      <a class="btn" href="https://github.com/notnaki/Halo">Build from source</a>
      <a class="btn" href="docs.html">Documentation</a>
    </nav>
  </main>
  <footer class="foot">
    <span>Alpha · macOS only · built on libghostty</span>
    <a href="https://github.com/notnaki/Halo">GitHub ↗</a>
  </footer>
  <script>
    // landing: letters spin through Redaction grades, then settle left-to-right (slot-machine feel)
    (function () {
      if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      var grades = ["Redaction 10","Redaction 20","Redaction 35","Redaction 50","Redaction 70","Redaction 100"];
      var letters = document.querySelectorAll(".wordmark span");
      if (!letters.length) return;
      function fam(g) { return '"' + g + '", Georgia, serif'; }

      function run() {
        var locked = [], step = 0;
        var tick = setInterval(function () {
          step++;
          letters.forEach(function (el, i) {
            if (locked[i]) return;
            el.style.fontFamily = fam(grades[(step + i) % grades.length]); // sequential, not random
          });
        }, 90);
        letters.forEach(function (el, i) {
          setTimeout(function () { locked[i] = true; el.style.fontFamily = ""; }, 850 + i * 200);
        });
        setTimeout(function () { clearInterval(tick); }, 850 + letters.length * 200);
      }

      // preload every grade first so the spin never flashes the Georgia fallback
      if (document.fonts && document.fonts.load) {
        Promise.all(grades.map(function (g) { return document.fonts.load('120px ' + JSON.stringify(g)); })).then(run, run);
      } else { run(); }
    })();
  </script>
</body>
</html>
